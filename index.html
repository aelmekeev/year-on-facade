<!DOCTYPE html>
<html>

<head>
  <title>Year on Facade</title>
  <link rel="stylesheet" type="text/css" href="css/list.css" />
  <meta name="viewport" content="width=device-width" />
  <meta charset="UTF-8">
  <script src="js/_generated/list.js"></script>
  <script src="js/_generated/years.js"></script>
  <script src="js/list.js"></script>
</head>

<body>
  <header>
    <div id="logo">
      <h1>Year on Facade</h1>
      <p>
        A collection of buildings with the year on their facade.
      </p>
    </div>
    <div id="links">
      <a id="wit" href="./what-is-this">What is this?</a>
    </div>
  </header>

  <main>
    <div id="controls">
      <div id="search-container" style="margin-bottom: 15px;">
        <input type="number" id="year-search" placeholder="Enter year..." min="1500" max="2100"
          style="padding: 5px; font-size: 16px; width: 120px;" />
        <button id="year-search-btn" style="padding: 6px 12px; font-size: 16px;">Search</button>
      </div>

      <div id="sort">
        <span>Sort</span>
        <input type="radio" id="by_count" name="sort" value="by_count" checked />
        <label for="by_count">by count</label>
        <input type="radio" id="alphabetically" name="sort" value="alphabetically" />
        <label for="alphabetically">alphabetically</label>
      </div>
    </div>

    <div id="marks">
      <div id="start"></div>
      <div id="end"></div>
    </div>
    <div id="list" />
  </main>
</body>

</html>
