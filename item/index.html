<!DOCTYPE html>
<html>

<head>
  <title>Year on Facade | Item</title>
  <link rel="stylesheet" type="text/css" href="../css/item.css" />
  <meta name="viewport" content="width=device-width" />
  <meta charset="UTF-8">
  <script>
    const url = new URL(window.location.href);
    const city = url.searchParams.get('city');
    document.title = `Year on Facade | Item | ${city.replace('_', ' ')}`

    const dataScript = document.createElement('script');
    dataScript.src = '../js/_generated/' + city + '.js';
    dataScript.defer = false;
    dataScript.async = false;
    document.head.appendChild(dataScript);

    const itemScript = document.createElement('script');
    itemScript.src = '../js/item.js'
    itemScript.defer = false;
    itemScript.async = false;
    document.head.appendChild(itemScript);
  </script>
</head>

<body>
  <header>
    <h1></h1>
  </header>

  <main>
    <div id="navigation" class="nav-container">
      <a id="prev-link" href="#" style="visibility: hidden;">&larr; Previous</a>
      <a id="next-link" href="#" style="visibility: hidden;">Next &rarr;</a>
    </div>

    <div class="line">
      Show on <a href="#" id="map">a map</a> / <a href="#" target="_blank" id="streetview">Street View</a>
    </div>

    <div class="line" id="back">
      <a href="#">Go back to World collection</a>
    </div>

    <div class="line" id="external">
      Open on <a href="#" target="_blank"></a>
    </div>

    <div class="line">
      All items from this <a href="#" id="more">place</a> / <a href="#" id="more-year">year</a>
    </div>

    <div class="line" id="notes"></div>

    <div id="photoContainer"></div>
  </main>

</body>

</html>
